<!DOCTYPE html>
<html>
<head>
  <title>Verification</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      margin-top: 120px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
    }

    .status {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 Device Verification</h2>
  <p>Secure your access</p>

  <button onclick="verify()">Verify Now</button>

  <div class="status" id="status"></div>
</div>

<script>
function verify() {

    let user = Telegram.WebApp.initDataUnsafe.user;

    if (!user) {
        alert("❌ Open inside Telegram bot");
        return;
    }

    fetch("https://YOUR-DOMAIN.com/verify", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            id: user.id,
            name: user.first_name
        })
    })
    .then(res => res.json())
    .then(data => {

        let statusDiv = document.getElementById("status");

        if (data.status === "success") {
            statusDiv.innerHTML = "✅ Verified Successfully";
        }
        else if (data.status === "info") {
            statusDiv.innerHTML = "✔️ Already Verified";
        }
        else {
            statusDiv.innerHTML = "🚫 Different Device";
        }

        setTimeout(() => {
            Telegram.WebApp.close();
        }, 2000);
    });
}
</script>

</body>
</html>
