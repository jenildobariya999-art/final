<!DOCTYPE html>
<html>
<head>
  <title>Verification</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    .box { margin-top: 120px; }
    button {
      padding: 15px 30px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 Device Verification</h2>
  <button onclick="verify()">Verify Now</button>
  <div id="status"></div>
</div>

<script>
Telegram.WebApp.ready();
Telegram.WebApp.expand();

function verify() {

    let user = Telegram.WebApp.initDataUnsafe.user;

    if (!user) {
        alert("❌ Open inside Telegram");
        return;
    }

    document.getElementById("status").innerHTML = "⏳ Verifying...";

    fetch("/api/verify", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            id: user.id
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "success") {
            status.innerHTML = "✅ Verified";
        } else {
            status.innerHTML = "❌ Error";
        }

        setTimeout(() => Telegram.WebApp.close(), 1500);
    });
}
</script>

</body>
</html>
