<!DOCTYPE html>
<html>
<head>
  <title>Verification</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<button onclick="verify()">Verify Now</button>
<div id="status"></div>

<script>
Telegram.WebApp.ready();
Telegram.WebApp.expand();

function verify() {

    let user = Telegram.WebApp.initDataUnsafe.user;

    if (!user) {
        alert("❌ Open inside Telegram");
        return;
    }

    let status = document.getElementById("status");
    status.innerHTML = "⏳ Verifying...";

    fetch(window.location.origin + "/api/verify", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: user.id })
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "success") {
            status.innerHTML = "✅ Verified";
        } else {
            status.innerHTML = "❌ " + data.message;
        }

        setTimeout(() => Telegram.WebApp.close(), 1500);
    })
    .catch(err => {
        status.innerHTML = "❌ Network Error: " + err.message;
    });
}
</script>

</body>
</html>
