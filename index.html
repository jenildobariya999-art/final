<script src="https://telegram.org/js/telegram-web-app.js"></script>

<button onclick="verify()">Verify Now</button>
<div id="status"></div>

<script>
Telegram.WebApp.ready();
Telegram.WebApp.expand();

function verify() {

    let user = Telegram.WebApp.initDataUnsafe.user;

    if (!user) {
        alert("❌ Please open inside Telegram bot");
        return;
    }

    let statusDiv = document.getElementById("status");
    statusDiv.innerHTML = "⏳ Verifying...";

    fetch("/api/verify", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: user.id })
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "success") {
            statusDiv.innerHTML = "✅ " + data.message;
        }
        else if (data.status === "info") {
            statusDiv.innerHTML = "✔️ " + data.message;
        }
        else {
            statusDiv.innerHTML = "❌ " + data.message;
        }

        setTimeout(() => Telegram.WebApp.close(), 2000);
    })
    .catch(err => {
        statusDiv.innerHTML = "❌ Network Error: " + err.message;
    });
}
</script>
