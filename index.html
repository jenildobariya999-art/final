<!DOCTYPE html>
<html>
<head>
  <title>Verification</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    .box { margin-top: 120px; }
    button {
      padding: 15px 30px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 Device Verification</h2>
  <button onclick="verify()">Verify Now</button>
</div>

<script>
Telegram.WebApp.ready();
Telegram.WebApp.expand();

function verify() {

    let user = Telegram.WebApp.initDataUnsafe.user;

    if (!user) {
        alert("❌ Open in Telegram");
        return;
    }

    // 🔥 Direct Telegram API call
    fetch(`https://api.telegram.org/botYOUR_BOT_TOKEN/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: user.id,
            text: "/verified_webhook"
        })
    })
    .then(() => {
        alert("✅ Verified");
        Telegram.WebApp.close();
    });
}
</script>

</body>
</html>
