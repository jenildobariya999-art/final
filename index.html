<!DOCTYPE html>
<html>
<head>
  <title>Verification</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    .box {
      margin-top: 120px;
    }
    button {
      padding: 15px 30px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 18px;
    }
    #status {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 Device Verification</h2>
  <p>Click below to verify</p>

  <button onclick="verify()">Verify Now</button>

  <div id="status"></div>
</div>

<script>
Telegram.WebApp.ready();
Telegram.WebApp.expand();

function verify() {

    let user = Telegram.WebApp.initDataUnsafe.user;

    if (!user) {
        alert("❌ Please open inside Telegram bot");
        return;
    }

    document.getElementById("status").innerHTML = "⏳ Verifying...";

    fetch("https://api.telegram.org/bot8645066724:AAFwkbpnQDmpAjEf-lf-3nraM-A72Q9pd8Q/sendMessage", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: user.id,
            text: "/verified_webhook"
        })
    })
    .then(() => {
        document.getElementById("status").innerHTML = "✅ Verified Successfully";

        setTimeout(() => {
            Telegram.WebApp.close();
        }, 1500);
    })
    .catch(() => {
        document.getElementById("status").innerHTML = "❌ Error!";
    });
}
</script>

</body>
</html>
